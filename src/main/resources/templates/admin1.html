
<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <style>
    body {
      background-color: #f8f9fa;
    }
    .sidebar {
      height: 100vh;
      background-color: #fff;
      border-right: 1px solid #ddd;
    }
    .sidebar .nav-link {
      color: #000;
    }
    .sidebar .nav-link.active {
      background-color: #007bff;
      color: #fff;
    }
    .navbar-dark {
      background-color: #343a40 !important;
    }
  </style>
</head>
<body>

<!-- Верхняя панель -->
<nav class="navbar navbar-dark navbar-expand-lg px-3">
  <span class="navbar-brand">admin@mail.ru with roles: <strong>ADMIN USER</strong></span>
  <div class="ms-auto">
    <a class="btn btn-outline-light" href="/logout">Logout</a>
  </div>
</nav>

<div class="container-fluid">
  <div class="row">
    <!-- Боковое меню -->
    <nav class="col-md-2 d-md-block sidebar">
      <div class="position-sticky pt-3">
        <ul class="nav flex-column">
          <li class="nav-item">
            <a class="nav-link active" href="#">Admin</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="user">User</a>
          </li>
        </ul>
      </div>
    </nav>

    <!-- Основное содержимое -->
    <main class="col-md-10 ms-sm-auto px-4">
      <h2 class="mt-3">Admin panel</h2>

      <!-- Таб навигации -->
      <ul class="nav nav-tabs mt-3">
        <li class="nav-item">
          <a class="nav-link active" href="#">Users table</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="/admin/addUser">New User</a>
        </li>
      </ul>

      <!-- Таблица пользователей -->
      <div class="card mt-3">
        <div class="card-header">
          <h5>All users</h5>
        </div>
        <div class="card-body">
          <table class="table table-striped">
            <thead>
            <tr>
              <th>ID</th>
              <th>First Name</th>
              <th>Last Name</th>
              <th>Age</th>
              <th>Email</th>
              <th>Role</th>
              <th>Edit</th>
              <th>Delete</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="user : ${users}">
              <td th:text="${user.id}"></td>
              <td th:text="${user.firstName}"></td>
              <td th:text="${user.lastName}"></td>
              <td th:text="${user.age}"></td>
              <td th:text="${user.email}"></td>
              <td>
    <span th:each="role, iterStat : ${user.roles}">
        <span th:text="${role.role}"></span><span th:if="!${iterStat.last}">, </span>
    </span>
              </td>
              <td>
                <a class="btn btn-info btn-sm" th:href="@{/admin/edit/{id}(id=${user.id})}">Edit</a>
              </td>
              <td>
                <form th:action="@{/admin/delete/{id}(id=${user.id})}" method="post">
                  <input type="hidden" name="_method" value="DELETE">
                  <button type="submit" class="btn btn-danger btn-sm">Delete</button>
                </form>
              </td>
            </tr>

            </tbody>
          </table>
        </div>
      </div>
    </main>
  </div>
</div>

</body>
</html>
